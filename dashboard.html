<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

header{
    background:#4f46e5;
    color:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logout{
    background:white;
    color:#4f46e5;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.container{
    width:90%;
    margin:40px auto;
}

.welcome{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.welcome h2{
    color:#4f46e5;
}

.filters{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.filters select{
    padding:12px;
    margin-right:15px;
    border-radius:8px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.card h3{
    color:#4f46e5;
}

.card p{
    margin:8px 0;
}

.match{
    color:green;
    font-weight:bold;
}

button.register{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button.register:hover{
    background:#3730a3;
}

</style>

</head>

<body>


<header>

    <div class="logo">
        EventAI
    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>

</header>

<div class="container">

<div class="welcome">

<h2 id="username">Welcome!</h2>

<p>Discover events recommended just for you.</p>

</div>

<div class="filters">

<select>
<option>Category</option>
<option>Hackathons</option>
<option>Workshops</option>
<option>Internships</option>
</select>

<select>
<option>Mode</option>
<option>Online</option>
<option>Offline</option>
</select>

<select>
<option>Technology</option>
<option>AI</option>
<option>Web Development</option>
<option>Cyber Security</option>
<option>Cloud</option>
</select>

</div>

<div class="cards">

<div class="card">

<h3>🤖 AI Innovation Hackathon</h3>

<p>📅 20 July</p>

<p>🌐 Online</p>

<p class="match">98% Match</p>

<button class="register">Register</button>

</div>

<div class="card">

<h3>💻 Full Stack Workshop</h3>

<p>📅 24 July</p>

<p>📍 Hyderabad</p>

<p class="match">95% Match</p>

<button class="register">Register</button>

</div>

<div class="card">

<h3>☁ AWS Cloud Bootcamp</h3>

<p>📅 30 July</p>

<p>🌐 Online</p>

<p class="match">92% Match</p>

<button class="register">Register</button>

</div>

</div>

</div>

<script>

let currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

    window.location.href="login.html";

}

document.getElementById("username").innerHTML=
"Welcome, "+currentUser.name+" 👋";

function logout(){

localStorage.removeItem("currentUser");

window.location.href="login.html";

}

</script>
<script src="js/auth.js"></script>
</body>
</html>

</body>
</html>
