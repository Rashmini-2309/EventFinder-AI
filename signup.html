<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventAI | Sign Up</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<script src="js/auth.js"></script>
<body>

<div class="container">

    <div class="left">

        <h1>EventAI</h1>

        <p>
            Join EventAI and discover hackathons,
            workshops and internships recommended
            just for you.
        </p>

    </div>

    <div class="right">

        <form id="signupForm">

            <h2>Create Account</h2>

            <input
            type="text"
            id="name"
            placeholder="Full Name"
            required>

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required>

            <button type="submit">
                Sign Up
            </button>

            <p class="login-text">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

</div>


</body>
</html>
