<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventAI | Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left">

        <h1>EventAI</h1>

        <p>
            Welcome Back!<br><br>

            Find Hackathons, Workshops,
            Internships and Events
            recommended by AI.
        </p>

    </div>

    <!-- Right Side -->

    <div class="right">

        <form id="loginForm">

            <h2>Login</h2>

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <label style="display:flex;align-items:center;margin-bottom:20px;gap:10px;">

                <input
                type="checkbox"
                id="remember"
                style="width:auto;">

                Remember Me

            </label>

            <button type="submit">

                Login

            </button>

            <p class="login-text">

                Don't have an account?

                <a href="signup.html">

                    Sign Up

                </a>

            </p>

        </form>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
